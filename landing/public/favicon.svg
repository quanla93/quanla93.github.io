<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 64 64" role="img" aria-label="quanla.org">
  <!-- Background: dark rounded square, works on both light + dark browser tabs -->
  <rect width="64" height="64" rx="14" fill="#09090b"/>

  <!-- Geometric Q: bold ring + diagonal tail -->
  <g stroke="#fafafa" stroke-width="6" stroke-linecap="round" fill="none">
    <circle cx="29" cy="28" r="14"/>
    <line x1="36" y1="35" x2="50" y2="49"/>
  </g>
</svg>
