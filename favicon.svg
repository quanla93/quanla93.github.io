<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="#0a0a0f"/>
  <!-- Accent border -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="url(#bg)" stroke-width="2"/>
  <!-- Glow dot -->
  <circle cx="52" cy="12" r="4" fill="url(#bg)" opacity="0.8"/>
  <!-- Letter Q - centered -->
  <text x="32" y="47" font-family="'Segoe UI','Arial',sans-serif" font-weight="800" font-size="40" fill="url(#bg)" text-anchor="middle">Q</text>
  <!-- Shine overlay -->
  <rect width="64" height="64" rx="16" fill="url(#shine)"/>
</svg>
