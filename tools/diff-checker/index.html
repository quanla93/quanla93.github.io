<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diff Checker | Le Anh Quan Tools</title>
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary:#0a0a0f;--bg-secondary:#111118;--bg-card:#16161e;
            --text-primary:#e4e4e7;--text-secondary:#a1a1aa;--text-muted:#71717a;
            --accent:#6366f1;--accent-light:#818cf8;--accent-2:#06b6d4;
            --border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.12);
            --font-main:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
            --add-bg:rgba(34,197,94,0.1);--add-border:#22c55e;
            --del-bg:rgba(239,68,68,0.1);--del-border:#ef4444;
            --mod-bg:rgba(234,179,8,0.08);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font-main);background:var(--bg-primary);color:var(--text-primary);min-height:100vh}
        .toolbar{background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
        .back-link{color:var(--text-secondary);text-decoration:none;font-size:14px;transition:color .2s}
        .back-link:hover{color:var(--accent-light)}
        h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .btn{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--bg-card);color:var(--text-primary);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
        .btn:hover{border-color:var(--border-hover);background:var(--bg-secondary)}
        .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
        .btn-primary:hover{background:var(--accent-light)}
        .toolbar-actions{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
        .editors{display:grid;grid-template-columns:1fr 1fr;height:40vh;min-height:250px}
        .editor-col{display:flex;flex-direction:column;border-right:1px solid var(--border)}
        .editor-col:last-child{border-right:none}
        .editor-header{padding:8px 14px;background:var(--bg-secondary);border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center}
        textarea{flex:1;padding:14px;background:var(--bg-primary);color:var(--text-primary);border:none;resize:none;font-family:var(--font-mono);font-size:13px;line-height:1.7;outline:none;width:100%}
        textarea::placeholder{color:var(--text-muted)}
        .stats{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
        .diff-output{max-height:50vh;overflow:auto;border-top:1px solid var(--border)}
        .diff-line{display:flex;font-family:var(--font-mono);font-size:13px;line-height:1.7;border-bottom:1px solid rgba(255,255,255,0.02)}
        .line-num{min-width:44px;padding:0 8px;text-align:right;color:var(--text-muted);font-size:11px;user-select:none;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center}
        .line-num span{display:block}
        .line-type{width:20px;text-align:center;user-select:none;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
        .line-content{flex:1;padding:0 12px;white-space:pre-wrap;word-break:break-all}
        .diff-add{background:var(--add-bg)}
        .diff-add .line-type{color:var(--add-border)}
        .diff-del{background:var(--del-bg)}
        .diff-del .line-type{color:var(--del-border)}
        .diff-mod{background:var(--mod-bg)}
        .word-add{background:rgba(34,197,94,0.25);border-radius:2px;padding:0 1px}
        .word-del{background:rgba(239,68,68,0.25);border-radius:2px;padding:0 1px;text-decoration:line-through}
        .diff-empty{padding:40px;text-align:center;color:var(--text-muted);font-size:14px}
        .summary{padding:10px 16px;background:var(--bg-secondary);border-top:1px solid var(--border);display:flex;gap:16px;font-size:12px;font-family:var(--font-mono);flex-wrap:wrap}
        .sum-add{color:var(--add-border)}.sum-del{color:var(--del-border)}.sum-same{color:var(--text-muted)}
        @media(max-width:700px){.editors{grid-template-columns:1fr;grid-template-rows:1fr 1fr}.editor-col{border-right:none;border-bottom:1px solid var(--border)}}
    </style>
</head>
<body>
    <div class="toolbar">
        <a href="../" class="back-link">&larr; Tools</a>
        <h1>Diff Checker</h1>
        <div class="toolbar-actions">
            <button class="btn" onclick="loadSample()">Sample</button>
            <button class="btn-primary btn" onclick="runDiff()">Compare</button>
            <button class="btn" onclick="swapTexts()">Swap</button>
            <button class="btn" onclick="clearAll()">Clear</button>
        </div>
    </div>
    <div class="editors">
        <div class="editor-col">
            <div class="editor-header"><span>Original</span><span class="stats" id="statsA">0 lines</span></div>
            <textarea id="textA" placeholder="Paste original text here..."></textarea>
        </div>
        <div class="editor-col">
            <div class="editor-header"><span>Modified</span><span class="stats" id="statsB">0 lines</span></div>
            <textarea id="textB" placeholder="Paste modified text here..."></textarea>
        </div>
    </div>
    <div class="summary" id="summary" style="display:none"></div>
    <div class="diff-output" id="diffOutput">
        <div class="diff-empty">Paste text in both panels and click Compare</div>
    </div>
    <script>
    const textA = document.getElementById('textA');
    const textB = document.getElementById('textB');
    const diffOutput = document.getElementById('diffOutput');
    const summary = document.getElementById('summary');

    function updateStats() {
        document.getElementById('statsA').textContent = (textA.value.split('\n').length) + ' lines';
        document.getElementById('statsB').textContent = (textB.value.split('\n').length) + ' lines';
    }
    textA.addEventListener('input', updateStats);
    textB.addEventListener('input', updateStats);

    // Myers diff algorithm (line-level)
    function diffLines(a, b) {
        const N = a.length, M = b.length;
        if (N === 0 && M === 0) return [];
        if (N === 0) return b.map(l => ({ type: 'add', text: l }));
        if (M === 0) return a.map(l => ({ type: 'del', text: l }));

        const max = N + M;
        const v = new Array(2 * max + 1);
        const trace = [];
        v[max + 1] = 0;

        for (let d = 0; d <= max; d++) {
            trace.push([...v]);
            for (let k = -d; k <= d; k += 2) {
                let x;
                if (k === -d || (k !== d && v[max + k - 1] < v[max + k + 1])) {
                    x = v[max + k + 1];
                } else {
                    x = v[max + k - 1] + 1;
                }
                let y = x - k;
                while (x < N && y < M && a[x] === b[y]) { x++; y++; }
                v[max + k] = x;
                if (x >= N && y >= M) {
                    // Backtrack
                    const result = [];
                    let cx = N, cy = M;
                    for (let dd = d; dd > 0; dd--) {
                        const tv = trace[dd - 1];
                        const ck = cx - cy;
                        let prevK;
                        if (ck === -dd || (ck !== dd && tv[max + ck - 1] < tv[max + ck + 1])) {
                            prevK = ck + 1;
                        } else {
                            prevK = ck - 1;
                        }
                        const prevX = tv[max + prevK];
                        const prevY = prevX - prevK;
                        while (cx > prevX && cy > prevY) {
                            cx--; cy--;
                            result.unshift({ type: 'same', text: a[cx] });
                        }
                        if (cx === prevX && cy > prevY) {
                            cy--;
                            result.unshift({ type: 'add', text: b[cy] });
                        } else if (cy === prevY && cx > prevX) {
                            cx--;
                            result.unshift({ type: 'del', text: a[cx] });
                        }
                    }
                    while (cx > 0 && cy > 0) {
                        cx--; cy--;
                        result.unshift({ type: 'same', text: a[cx] });
                    }
                    return result;
                }
            }
        }
        return a.map(l => ({ type: 'del', text: l })).concat(b.map(l => ({ type: 'add', text: l })));
    }

    // Word-level diff for modified lines
    function diffWords(oldLine, newLine) {
        const oldW = oldLine.split(/(\s+)/);
        const newW = newLine.split(/(\s+)/);
        const d = diffLines(oldW, newW);
        let oldHTML = '', newHTML = '';
        d.forEach(item => {
            const esc = item.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            if (item.type === 'same') { oldHTML += esc; newHTML += esc; }
            else if (item.type === 'del') { oldHTML += `<span class="word-del">${esc}</span>`; }
            else { newHTML += `<span class="word-add">${esc}</span>`; }
        });
        return { oldHTML, newHTML };
    }

    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function runDiff() {
        const linesA = textA.value.split('\n');
        const linesB = textB.value.split('\n');
        const diff = diffLines(linesA, linesB);

        let html = '';
        let lineA = 0, lineB = 0;
        let addCount = 0, delCount = 0, sameCount = 0;

        // Group consecutive del+add as modifications for word diff
        const processed = [];
        for (let i = 0; i < diff.length; i++) {
            if (diff[i].type === 'del' && i + 1 < diff.length && diff[i + 1].type === 'add') {
                processed.push({ type: 'mod', oldText: diff[i].text, newText: diff[i + 1].text });
                i++;
            } else {
                processed.push(diff[i]);
            }
        }

        processed.forEach(item => {
            if (item.type === 'same') {
                lineA++; lineB++; sameCount++;
                html += `<div class="diff-line"><div class="line-num"><span>${lineA}</span><span>${lineB}</span></div><div class="line-type"></div><div class="line-content">${esc(item.text)}</div></div>`;
            } else if (item.type === 'del') {
                lineA++; delCount++;
                html += `<div class="diff-line diff-del"><div class="line-num"><span>${lineA}</span><span></span></div><div class="line-type">-</div><div class="line-content">${esc(item.text)}</div></div>`;
            } else if (item.type === 'add') {
                lineB++; addCount++;
                html += `<div class="diff-line diff-add"><div class="line-num"><span></span><span>${lineB}</span></div><div class="line-type">+</div><div class="line-content">${esc(item.text)}</div></div>`;
            } else if (item.type === 'mod') {
                lineA++; lineB++; delCount++; addCount++;
                const wd = diffWords(item.oldText, item.newText);
                html += `<div class="diff-line diff-del"><div class="line-num"><span>${lineA}</span><span></span></div><div class="line-type">-</div><div class="line-content">${wd.oldHTML}</div></div>`;
                html += `<div class="diff-line diff-add"><div class="line-num"><span></span><span>${lineB}</span></div><div class="line-type">+</div><div class="line-content">${wd.newHTML}</div></div>`;
            }
        });

        if (!html) html = '<div class="diff-empty">Texts are identical!</div>';
        diffOutput.innerHTML = html;
        summary.style.display = 'flex';
        summary.innerHTML = `<span class="sum-add">+${addCount} added</span><span class="sum-del">-${delCount} removed</span><span class="sum-same">${sameCount} unchanged</span>`;
    }

    function swapTexts() {
        const tmp = textA.value;
        textA.value = textB.value;
        textB.value = tmp;
        updateStats();
    }

    function clearAll() {
        textA.value = ''; textB.value = '';
        diffOutput.innerHTML = '<div class="diff-empty">Paste text in both panels and click Compare</div>';
        summary.style.display = 'none';
        updateStats();
    }

    function loadSample() {
        textA.value = `function greet(name) {
    console.log("Hello, " + name);
    return true;
}

const users = ["Alice", "Bob"];
users.forEach(greet);`;
        textB.value = `function greet(name, greeting = "Hello") {
    console.log(greeting + ", " + name + "!");
    return true;
}

const users = ["Alice", "Bob", "Charlie"];
users.forEach(user => greet(user));
console.log("Done!");`;
        updateStats();
        runDiff();
    }
    </script>
</body>
</html>
