<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator | Le Anh Quan Tools</title>
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #16161e;
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-2: #06b6d4;
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .toolbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--accent-light); }

        h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-layout {
            max-width: 900px;
            margin: 32px auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: start;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .card-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            min-height: 100px;
            transition: border-color 0.2s;
        }

        textarea:focus { border-color: var(--accent); }
        textarea::placeholder { color: var(--text-muted); }

        select, input[type="color"] {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus { border-color: var(--accent); }

        .color-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .color-input {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="color"] {
            width: 40px;
            height: 40px;
            padding: 2px;
            cursor: pointer;
            border-radius: 8px;
        }

        .color-hex {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-secondary);
        }

        .preset-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .preset-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            border-color: var(--accent);
            color: var(--accent-light);
        }

        .btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .btn:hover {
            border-color: var(--border-hover);
            background: var(--bg-secondary);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            margin-bottom: 8px;
        }

        .btn-primary:hover {
            background: var(--accent-light);
        }

        .qr-preview {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .qr-frame {
            background: white;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 260px;
            min-width: 260px;
        }

        .qr-placeholder {
            color: #999;
            font-size: 14px;
            text-align: center;
        }

        #qrCanvas {
            display: block;
            image-rendering: pixelated;
            max-width: 260px;
            max-height: 260px;
            width: 100%;
            height: auto;
        }

        .download-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 100%;
        }

        .logo-upload-area { margin-top: 4px; }

        .logo-placeholder {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logo-placeholder:hover {
            border-color: var(--accent);
            color: var(--accent-light);
        }

        .logo-preview-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-preview-row img {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: contain;
            background: white;
            padding: 4px;
        }

        .btn-remove-logo {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            border-radius: 6px;
            width: 28px;
            height: 28px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-remove-logo:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .option-inline {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 10px 20px;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .toast.show { opacity: 1; transform: translateY(0); }

        @media (max-width: 700px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <a href="../../" class="back-link">&larr; Portfolio</a>
        <h1>QR Code Generator</h1>
    </div>

    <div class="main-layout">
        <div class="card">
            <div class="card-title">Settings</div>

            <div class="preset-row">
                <button class="preset-btn" onclick="setPreset('url')">URL</button>
                <button class="preset-btn" onclick="setPreset('email')">Email</button>
                <button class="preset-btn" onclick="setPreset('phone')">Phone</button>
                <button class="preset-btn" onclick="setPreset('wifi')">WiFi</button>
                <button class="preset-btn" onclick="setPreset('vcard')">vCard</button>
            </div>

            <div class="input-group">
                <label>Content</label>
                <textarea id="qrText" placeholder="Enter text, URL, or data...">https://quanla93.github.io</textarea>
            </div>

            <div class="input-group">
                <label>Size</label>
                <select id="qrSize">
                    <option value="200">200 x 200</option>
                    <option value="300" selected>300 x 300</option>
                    <option value="400">400 x 400</option>
                    <option value="600">600 x 600</option>
                    <option value="800">800 x 800</option>
                    <option value="1024">1024 x 1024</option>
                </select>
            </div>

            <div class="input-group">
                <label>Error Correction</label>
                <select id="qrEC">
                    <option value="L">Low (7%)</option>
                    <option value="M" selected>Medium (15%)</option>
                    <option value="Q">Quartile (25%)</option>
                    <option value="H">High (30%)</option>
                </select>
            </div>

            <div class="input-group">
                <label>Colors</label>
                <div class="color-row">
                    <div>
                        <label style="font-size:11px;color:var(--text-muted)">Foreground</label>
                        <div class="color-input">
                            <input type="color" id="fgColor" value="#000000">
                            <span class="color-hex" id="fgHex">#000000</span>
                        </div>
                    </div>
                    <div>
                        <label style="font-size:11px;color:var(--text-muted)">Background</label>
                        <div class="color-input">
                            <input type="color" id="bgColor" value="#FFFFFF">
                            <span class="color-hex" id="bgHex">#FFFFFF</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label>Logo / Image (optional)</label>
                <div class="logo-upload-area" id="logoUploadArea">
                    <input type="file" id="logoInput" accept="image/*" style="display:none">
                    <div class="logo-placeholder" id="logoPlaceholder" onclick="document.getElementById('logoInput').click()">
                        Click to upload logo
                    </div>
                    <div class="logo-preview-row" id="logoPreviewRow" style="display:none">
                        <img id="logoPreview" src="" alt="Logo preview">
                        <button class="btn-remove-logo" onclick="removeLogo()" title="Remove logo">&times;</button>
                    </div>
                </div>
                <div class="logo-options" id="logoOptions" style="display:none;margin-top:8px">
                    <div class="option-inline">
                        <label style="font-size:11px;color:var(--text-muted)">Logo size:</label>
                        <select id="logoSize" style="width:auto;padding:4px 8px;font-size:12px">
                            <option value="0.10">Small (10%)</option>
                            <option value="0.15" selected>Medium (15%)</option>
                            <option value="0.20">Large (20%)</option>
                            <option value="0.25">Extra (25%)</option>
                        </select>
                    </div>
                    <div class="option-inline" style="margin-top:6px">
                        <input type="checkbox" id="logoBgWhite" checked style="accent-color:var(--accent)">
                        <label for="logoBgWhite" style="font-size:12px;color:var(--text-secondary)">White background padding</label>
                    </div>
                </div>
                <p style="font-size:11px;color:var(--text-muted);margin-top:6px">Tip: Use High (H) error correction for best logo results</p>
            </div>

            <button class="btn btn-primary" onclick="generateQR()">Generate QR Code</button>
        </div>

        <div class="card">
            <div class="card-title">Preview</div>
            <div class="qr-preview">
                <div class="qr-frame" id="qrFrame">
                    <canvas id="qrCanvas"></canvas>
                </div>
                <div class="download-row">
                    <button class="btn" onclick="downloadQR('png')">Download PNG</button>
                    <button class="btn" onclick="downloadQR('svg')">Download SVG</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- QR Code library - proven, battle-tested -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script>
    // Wrapper around qrcode-generator library (battle-tested, ISO/IEC 18004 compliant)
    const QRCode = (() => {
        const EC_MAP = { L: 'L', M: 'M', Q: 'Q', H: 'H' };

        function createQR(text, ecLevel) {
            // Auto-detect best version (0 = auto)
            const qr = qrcode(0, EC_MAP[ecLevel] || 'M');
            qr.addData(text);
            qr.make();
            return qr;
        }

        function toCanvas(canvas, text, options = {}) {
            const { ecLevel = 'M', size: pixelSize = 300, fg = '#000000', bg = '#FFFFFF', excludeRatio = 0 } = options;
            const qr = createQR(text, ecLevel);
            const moduleCount = qr.getModuleCount();

            const quiet = 4;
            const totalModules = moduleCount + quiet * 2;
            const scale = pixelSize / totalModules;

            canvas.width = pixelSize;
            canvas.height = pixelSize;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, pixelSize, pixelSize);

            // Calculate center exclusion zone in module coordinates
            let exclMin = -1, exclMax = -1;
            if (excludeRatio > 0) {
                const exclModules = Math.ceil(moduleCount * excludeRatio);
                const center = Math.floor(moduleCount / 2);
                const half = Math.ceil(exclModules / 2);
                exclMin = center - half;
                exclMax = center + half;
            }

            ctx.fillStyle = fg;
            for (let r = 0; r < moduleCount; r++) {
                for (let c = 0; c < moduleCount; c++) {
                    if (excludeRatio > 0 && r >= exclMin && r < exclMax && c >= exclMin && c < exclMax) continue;
                    if (qr.isDark(r, c)) {
                        ctx.fillRect(
                            Math.round((c + quiet) * scale),
                            Math.round((r + quiet) * scale),
                            Math.ceil(scale),
                            Math.ceil(scale)
                        );
                    }
                }
            }

            return { moduleCount, quiet };
        }

        function toSVG(text, options = {}) {
            const { ecLevel = 'M', fg = '#000000', bg = '#FFFFFF' } = options;
            const qr = createQR(text, ecLevel);
            const moduleCount = qr.getModuleCount();
            const quiet = 4;
            const total = moduleCount + quiet * 2;

            let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${total} ${total}" shape-rendering="crispEdges">`;
            svg += `<rect width="${total}" height="${total}" fill="${bg}"/>`;
            svg += `<path fill="${fg}" d="`;

            for (let r = 0; r < moduleCount; r++) {
                for (let c = 0; c < moduleCount; c++) {
                    if (qr.isDark(r, c)) {
                        svg += `M${c + quiet},${r + quiet}h1v1h-1z`;
                    }
                }
            }

            svg += `"/></svg>`;
            return svg;
        }

        return { toCanvas, toSVG };
    })();
    </script>

    <script>
        const qrText = document.getElementById('qrText');
        const qrCanvas = document.getElementById('qrCanvas');
        const fgColor = document.getElementById('fgColor');
        const bgColor = document.getElementById('bgColor');
        const logoInput = document.getElementById('logoInput');
        const logoPreview = document.getElementById('logoPreview');
        const logoPlaceholder = document.getElementById('logoPlaceholder');
        const logoPreviewRow = document.getElementById('logoPreviewRow');
        const logoOptions = document.getElementById('logoOptions');

        let logoImage = null;

        // Auto-regenerate on any setting change
        fgColor.addEventListener('input', () => {
            document.getElementById('fgHex').textContent = fgColor.value.toUpperCase();
            generateQR();
        });
        bgColor.addEventListener('input', () => {
            document.getElementById('bgHex').textContent = bgColor.value.toUpperCase();
            generateQR();
        });
        document.getElementById('qrSize').addEventListener('change', generateQR);
        document.getElementById('qrEC').addEventListener('change', generateQR);
        document.getElementById('logoSize').addEventListener('change', generateQR);
        document.getElementById('logoBgWhite').addEventListener('change', generateQR);

        // Logo upload
        logoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    logoImage = img;
                    logoPreview.src = ev.target.result;
                    logoPlaceholder.style.display = 'none';
                    logoPreviewRow.style.display = 'flex';
                    logoOptions.style.display = 'block';
                    // Auto-switch to High EC for better logo support
                    const ecSelect = document.getElementById('qrEC');
                    if (ecSelect.value !== 'H') {
                        ecSelect.value = 'H';
                        showToast('Switched to High error correction for logo');
                    }
                    generateQR();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        function removeLogo() {
            logoImage = null;
            logoInput.value = '';
            logoPlaceholder.style.display = 'block';
            logoPreviewRow.style.display = 'none';
            logoOptions.style.display = 'none';
            generateQR();
        }

        function setPreset(type) {
            const templates = {
                url: 'https://example.com',
                email: 'mailto:your@email.com?subject=Hello&body=Hi there!',
                phone: 'tel:+84123456789',
                wifi: 'WIFI:T:WPA;S:NetworkName;P:Password123;;',
                vcard: 'BEGIN:VCARD\nVERSION:3.0\nN:Doe;John\nTEL:+1234567890\nEMAIL:john@example.com\nEND:VCARD'
            };
            qrText.value = templates[type] || '';
            generateQR();
        }

        function getLogoExcludeRatio() {
            if (!logoImage) return 0;
            const ratio = parseFloat(document.getElementById('logoSize').value);
            // Add extra margin so no QR modules touch the logo edge
            return ratio + 0.08;
        }

        function drawLogoOnCanvas(canvas) {
            if (!logoImage) return;
            const ctx = canvas.getContext('2d');
            const ratio = parseFloat(document.getElementById('logoSize').value);
            const addBg = document.getElementById('logoBgWhite').checked;

            const logoW = canvas.width * ratio;
            const logoH = canvas.height * ratio;
            const x = (canvas.width - logoW) / 2;
            const y = (canvas.height - logoH) / 2;

            // White border around logo for clean separation
            if (addBg) {
                const pad = logoW * 0.15;
                ctx.fillStyle = bgColor.value;
                ctx.fillRect(x - pad, y - pad, logoW + pad * 2, logoH + pad * 2);
            }

            // Draw logo with slight rounded corners
            ctx.save();
            const logoR = logoW * 0.06;
            ctx.beginPath();
            ctx.moveTo(x + logoR, y);
            ctx.arcTo(x + logoW, y, x + logoW, y + logoH, logoR);
            ctx.arcTo(x + logoW, y + logoH, x, y + logoH, logoR);
            ctx.arcTo(x, y + logoH, x, y, logoR);
            ctx.arcTo(x, y, x + logoW, y, logoR);
            ctx.closePath();
            ctx.clip();
            ctx.drawImage(logoImage, x, y, logoW, logoH);
            ctx.restore();
        }

        function generateQR() {
            const text = qrText.value.trim();
            if (!text) return;

            try {
                const size = parseInt(document.getElementById('qrSize').value);
                const ec = document.getElementById('qrEC').value;
                // When logo present, render at minimum 600px for better module clarity
                const renderSize = logoImage ? Math.max(size, 600) : size;
                const excludeRatio = getLogoExcludeRatio();

                QRCode.toCanvas(qrCanvas, text, {
                    ecLevel: ec,
                    size: renderSize,
                    fg: fgColor.value,
                    bg: bgColor.value,
                    excludeRatio: excludeRatio
                });

                drawLogoOnCanvas(qrCanvas);
            } catch (e) {
                showToast('Error: ' + e.message);
            }
        }

        function downloadQR(format) {
            const text = qrText.value.trim();
            if (!text) return;

            if (format === 'png') {
                const size = parseInt(document.getElementById('qrSize').value);
                const tmpCanvas = document.createElement('canvas');
                const excludeRatio = getLogoExcludeRatio();
                QRCode.toCanvas(tmpCanvas, text, {
                    ecLevel: document.getElementById('qrEC').value,
                    size: size,
                    fg: fgColor.value,
                    bg: bgColor.value,
                    excludeRatio: excludeRatio
                });
                if (logoImage) {
                    drawLogoOnCanvas(tmpCanvas);
                }
                const link = document.createElement('a');
                link.download = 'qrcode.png';
                link.href = tmpCanvas.toDataURL('image/png');
                link.click();
            } else {
                const svg = QRCode.toSVG(text, {
                    ecLevel: document.getElementById('qrEC').value,
                    fg: fgColor.value,
                    bg: bgColor.value
                });
                const blob = new Blob([svg], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = 'qrcode.svg';
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
            }
            showToast('Downloaded!');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // Auto-generate on text input
        qrText.addEventListener('input', debounce(generateQR, 400));

        function debounce(fn, delay) {
            let timer;
            return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
        }

        // Generate on load
        generateQR();
    </script>
</body>
</html>
