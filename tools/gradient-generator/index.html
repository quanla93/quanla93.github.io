<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Generator | Le Anh Quan Tools</title>
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary:#0a0a0f;--bg-secondary:#111118;--bg-card:#16161e;
            --text-primary:#e4e4e7;--text-secondary:#a1a1aa;--text-muted:#71717a;
            --accent:#6366f1;--accent-light:#818cf8;--accent-2:#06b6d4;
            --border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.12);
            --font-main:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font-main);background:var(--bg-primary);color:var(--text-primary);min-height:100vh}
        .toolbar{background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px}
        .back-link{color:var(--text-secondary);text-decoration:none;font-size:14px;transition:color .2s}
        .back-link:hover{color:var(--accent-light)}
        h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .main{max-width:960px;margin:24px auto;padding:0 24px}
        .preview-box{width:100%;height:200px;border-radius:12px;border:1px solid var(--border);margin-bottom:20px;transition:all .3s}
        .controls{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
        .card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px}
        .card-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:14px}
        .control-row{display:flex;gap:10px;align-items:center;margin-bottom:12px}
        .control-row label{font-size:12px;color:var(--text-secondary);min-width:70px}
        select,input[type="number"]{padding:8px 10px;background:var(--bg-primary);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:var(--font-main);font-size:13px;outline:none}
        select:focus,input:focus{border-color:var(--accent)}
        input[type="range"]{flex:1;accent-color:var(--accent)}
        .range-val{font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);min-width:40px;text-align:right}
        .stops-list{display:flex;flex-direction:column;gap:8px}
        .stop-row{display:flex;align-items:center;gap:8px}
        .stop-row input[type="color"]{width:34px;height:34px;padding:2px;border:1px solid var(--border);border-radius:6px;background:var(--bg-primary);cursor:pointer}
        .stop-row input[type="number"]{width:60px}
        .btn-sm{padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:12px;cursor:pointer;transition:all .2s}
        .btn-sm:hover{border-color:var(--accent);color:var(--accent-light)}
        .btn-remove{color:#ef4444;border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.05)}
        .btn-remove:hover{background:rgba(239,68,68,0.15)}
        .code-output{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
        .code-header{padding:10px 16px;background:var(--bg-secondary);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .code-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
        .btn{padding:7px 14px;border:1px solid var(--border);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:12px;cursor:pointer;transition:all .2s}
        .btn:hover{border-color:var(--border-hover);background:var(--bg-secondary)}
        .code-body{padding:16px;font-family:var(--font-mono);font-size:13px;line-height:1.7;color:var(--accent-light);word-break:break-all}
        .presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
        .preset{width:48px;height:32px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:border-color .2s}
        .preset:hover,.preset.active{border-color:var(--accent-light)}
        .toast{position:fixed;bottom:24px;right:24px;padding:10px 20px;border-radius:8px;background:#22c55e;color:#fff;font-size:13px;font-weight:500;opacity:0;transform:translateY(10px);transition:all .3s;z-index:100}
        .toast.show{opacity:1;transform:translateY(0)}
        @media(max-width:700px){.controls{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="toolbar">
        <a href="../" class="back-link">&larr; Tools</a>
        <h1>Gradient Generator</h1>
    </div>
    <div class="main">
        <div class="presets" id="presets"></div>
        <div class="preview-box" id="preview"></div>
        <div class="controls">
            <div class="card">
                <div class="card-title">Type & Direction</div>
                <div class="control-row">
                    <label>Type</label>
                    <select id="gradType">
                        <option value="linear">Linear</option>
                        <option value="radial">Radial</option>
                        <option value="conic">Conic</option>
                    </select>
                </div>
                <div class="control-row" id="angleRow">
                    <label>Angle</label>
                    <input type="range" id="angleRange" min="0" max="360" value="135">
                    <span class="range-val" id="angleVal">135&deg;</span>
                </div>
                <div class="control-row" id="radialRow" style="display:none">
                    <label>Shape</label>
                    <select id="radialShape">
                        <option value="circle">Circle</option>
                        <option value="ellipse">Ellipse</option>
                    </select>
                </div>
            </div>
            <div class="card">
                <div class="card-title">Color Stops</div>
                <div class="stops-list" id="stopsList"></div>
                <button class="btn-sm" onclick="addStop()" style="margin-top:10px">+ Add Stop</button>
            </div>
        </div>
        <div class="code-output">
            <div class="code-header">
                <span class="code-label">CSS Code</span>
                <button class="btn" onclick="copyCSS()">Copy CSS</button>
            </div>
            <div class="code-body" id="cssCode"></div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
    let stops = [
        {color:'#6366f1',pos:0},
        {color:'#06b6d4',pos:50},
        {color:'#8b5cf6',pos:100}
    ];

    const presetGradients = [
        [{color:'#667eea',pos:0},{color:'#764ba2',pos:100}],
        [{color:'#f093fb',pos:0},{color:'#f5576c',pos:100}],
        [{color:'#4facfe',pos:0},{color:'#00f2fe',pos:100}],
        [{color:'#43e97b',pos:0},{color:'#38f9d7',pos:100}],
        [{color:'#fa709a',pos:0},{color:'#fee140',pos:100}],
        [{color:'#a18cd1',pos:0},{color:'#fbc2eb',pos:100}],
        [{color:'#fccb90',pos:0},{color:'#d57eeb',pos:100}],
        [{color:'#ff9a9e',pos:0},{color:'#fecfef',pos:50},{color:'#fecfef',pos:100}],
        [{color:'#0c0c0c',pos:0},{color:'#6366f1',pos:50},{color:'#0c0c0c',pos:100}],
        [{color:'#ff6b6b',pos:0},{color:'#feca57',pos:33},{color:'#48dbfb',pos:66},{color:'#ff9ff3',pos:100}],
    ];

    function buildPresets() {
        const container = document.getElementById('presets');
        presetGradients.forEach((p, i) => {
            const d = document.createElement('div');
            d.className = 'preset';
            d.style.background = buildGradientCSS('linear', 135, p, 'circle');
            d.onclick = () => { stops = p.map(s=>({...s})); render(); };
            container.appendChild(d);
        });
    }

    function buildGradientCSS(type, angle, stps, shape) {
        const colorStops = stps.map(s => `${s.color} ${s.pos}%`).join(', ');
        if (type === 'linear') return `linear-gradient(${angle}deg, ${colorStops})`;
        if (type === 'radial') return `radial-gradient(${shape}, ${colorStops})`;
        return `conic-gradient(from ${angle}deg, ${colorStops})`;
    }

    function render() {
        const type = document.getElementById('gradType').value;
        const angle = document.getElementById('angleRange').value;
        const shape = document.getElementById('radialShape').value;

        document.getElementById('angleRow').style.display = type === 'radial' ? 'none' : 'flex';
        document.getElementById('radialRow').style.display = type === 'radial' ? 'flex' : 'none';

        const css = buildGradientCSS(type, angle, stops, shape);
        document.getElementById('preview').style.background = css;
        document.getElementById('cssCode').textContent = `background: ${css};`;
        document.getElementById('angleVal').innerHTML = angle + '&deg;';

        // Render stops
        const list = document.getElementById('stopsList');
        list.innerHTML = '';
        stops.forEach((s, i) => {
            const row = document.createElement('div');
            row.className = 'stop-row';
            row.innerHTML = `
                <input type="color" value="${s.color}" onchange="stops[${i}].color=this.value;render()">
                <input type="range" min="0" max="100" value="${s.pos}" oninput="stops[${i}].pos=+this.value;render()" style="flex:1">
                <input type="number" min="0" max="100" value="${s.pos}" onchange="stops[${i}].pos=+this.value;render()" style="width:55px">
                ${stops.length > 2 ? `<button class="btn-sm btn-remove" onclick="stops.splice(${i},1);render()">&times;</button>` : ''}
            `;
            list.appendChild(row);
        });
    }

    function addStop() {
        const last = stops[stops.length - 1];
        const prev = stops[stops.length - 2];
        const newPos = Math.min(100, last.pos + 10);
        stops.push({ color: '#ffffff', pos: newPos });
        render();
    }

    function copyCSS() {
        const code = document.getElementById('cssCode').textContent;
        navigator.clipboard.writeText(code).then(() => {
            const t = document.getElementById('toast');
            t.textContent = 'Copied!';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        });
    }

    document.getElementById('gradType').addEventListener('change', render);
    document.getElementById('angleRange').addEventListener('input', render);
    document.getElementById('radialShape').addEventListener('change', render);

    buildPresets();
    render();
    </script>
</body>
</html>
